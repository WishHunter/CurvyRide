name: CurvyRide
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: 17.0

packages:
  Factory:
    url: https://github.com/hmlongco/Factory.git
    from: 2.5.3

targets:
  CurvyRideApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Modules
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: CurvyRide
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.curvyride.app
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Factory
        product: Factory

  CurvyRideAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/CurvyRideAppTests
    settings:
      base:
        SWIFT_VERSION: 5.0
    dependencies:
      - target: CurvyRideApp
