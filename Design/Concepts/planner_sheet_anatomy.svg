<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1420" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F1EC"/>
      <stop offset="1" stop-color="#ECE6DE"/>
    </linearGradient>
    <pattern id="topo" width="240" height="240" patternUnits="userSpaceOnUse">
      <path d="M10 48C56 14 134 12 220 44" stroke="#E3DDD5" stroke-width="3" stroke-linecap="round"/>
      <path d="M18 112C70 78 146 76 226 108" stroke="#E8E2DB" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M-2 176C60 146 142 144 228 174" stroke="#E0D9D2" stroke-width="2.4" stroke-linecap="round"/>
    </pattern>
    <filter id="shadowPhone" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#30271F" flood-opacity="0.18"/>
    </filter>
    <filter id="shadowCard" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#30271F" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="shellFill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFEFC" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#F4EEE7" stop-opacity="0.76"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1040" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="1040" fill="url(#topo)" opacity="0.55"/>

  <text x="88" y="96" fill="#211C18" font-size="40" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Planner Sheet Anatomy</text>
  <text x="88" y="132" fill="#6D655E" font-size="22" font-family="Helvetica Neue, Arial, sans-serif">A floating cockpit, not a heavy slab pinned to the bottom.</text>

  <g transform="translate(94 208)" filter="url(#shadowPhone)">
    <rect width="612" height="760" rx="72" fill="#171411"/>
    <rect x="18" y="18" width="576" height="724" rx="54" fill="#F2EDE6"/>
    <rect x="210" y="30" width="192" height="36" rx="18" fill="#171411"/>
    <rect x="44" y="92" width="524" height="620" rx="42" fill="#EEE8E2"/>
    <rect x="44" y="92" width="524" height="620" rx="42" fill="url(#topo)" opacity="0.82"/>

    <path d="M144 260C214 214 274 240 330 318C386 394 442 430 506 462" stroke="#C58A4A" stroke-width="12" stroke-linecap="round"/>
    <path d="M144 260C214 214 274 240 330 318C386 394 442 430 506 462" stroke="#2A241E" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 18"/>
    <circle cx="144" cy="260" r="20" fill="#FBFAF7" stroke="#2A241E" stroke-width="7"/>
    <circle cx="506" cy="462" r="20" fill="#FBFAF7" stroke="#2A241E" stroke-width="7"/>

    <g transform="translate(84 144)" filter="url(#shadowCard)">
      <rect width="448" height="462" rx="42" fill="url(#shellFill)"/>
      <rect x="186" y="18" width="76" height="6" rx="3" fill="#D0C7BD"/>

      <text x="28" y="56" fill="#25211C" font-size="25" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Plan this ride</text>
      <text x="28" y="82" fill="#726A62" font-size="15" font-family="Helvetica Neue, Arial, sans-serif">Detached shell. Visible map crown.</text>

      <rect x="24" y="110" width="400" height="78" rx="24" fill="#FBFAF7"/>
      <text x="46" y="140" fill="#756E67" font-size="12" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">START POINT</text>
      <text x="46" y="167" fill="#25211C" font-size="21" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Current location</text>
      <circle cx="386" cy="150" r="18" fill="#F2ECE4"/>
      <path d="M378 150H394" stroke="#2A241E" stroke-width="2"/>
      <path d="M386 142V158" stroke="#2A241E" stroke-width="2"/>

      <rect x="24" y="204" width="186" height="116" rx="28" fill="#FBFAF7"/>
      <text x="46" y="236" fill="#756E67" font-size="12" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">DURATION</text>
      <text x="46" y="284" fill="#25211C" font-size="46" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">90</text>
      <text x="112" y="284" fill="#756E67" font-size="18" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">min</text>
      <rect x="46" y="296" width="108" height="10" rx="5" fill="#ECE4DA"/>
      <rect x="46" y="296" width="62" height="10" rx="5" fill="#C58A4A"/>

      <rect x="224" y="204" width="200" height="116" rx="28" fill="#FBFAF7"/>
      <text x="246" y="236" fill="#756E67" font-size="12" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">RIDE MODE</text>
      <rect x="246" y="252" width="56" height="28" rx="14" fill="#EFE6DA"/>
      <rect x="310" y="252" width="82" height="28" rx="14" fill="#F4EFE8"/>
      <text x="263" y="270" fill="#A56E36" font-size="12" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Loop</text>
      <text x="333" y="270" fill="#5E5852" font-size="12" font-weight="600" font-family="Helvetica Neue, Arial, sans-serif">Fast return</text>
      <path d="M246 302C262 286 278 286 296 304C314 322 338 328 368 316" stroke="#2A241E" stroke-width="3.2"/>
      <path d="M246 302C262 286 278 286 296 304C314 322 338 328 368 316" stroke="#C58A4A" stroke-width="8" stroke-opacity="0.26"/>

      <rect x="24" y="338" width="400" height="64" rx="24" fill="#FBFAF7"/>
      <text x="46" y="378" fill="#25211C" font-size="17" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Avoid highways</text>
      <rect x="350" y="354" width="52" height="28" rx="14" fill="#EFE6DA"/>
      <circle cx="388" cy="368" r="10" fill="#C58A4A"/>

      <rect x="24" y="418" width="110" height="20" rx="10" fill="#EFE6DA"/>
      <rect x="146" y="418" width="92" height="20" rx="10" fill="#F4EFE8"/>
      <rect x="250" y="418" width="110" height="20" rx="10" fill="#F4EFE8"/>
    </g>

    <g transform="translate(112 626)" filter="url(#shadowCard)">
      <rect width="392" height="72" rx="26" fill="#FBFAF7"/>
      <rect x="14" y="12" width="122" height="48" rx="24" fill="#F3EEE8"/>
      <text x="38" y="42" fill="#5D5750" font-size="16" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Surprise me</text>
      <rect x="146" y="12" width="232" height="48" rx="24" fill="#2B2520"/>
      <text x="204" y="42" fill="#FBFAF7" font-size="16" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Generate route</text>
    </g>
  </g>

  <g transform="translate(826 222)">
    <rect width="686" height="744" rx="40" fill="#FBF8F3" filter="url(#shadowCard)"/>
    <text x="42" y="62" fill="#25211C" font-size="30" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Why this sheet works</text>

    <circle cx="58" cy="122" r="11" fill="#C58A4A"/>
    <text x="84" y="130" fill="#25211C" font-size="22" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Detached shell</text>
    <text x="84" y="160" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">It never touches both screen edges.</text>
    <text x="84" y="186" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">That keeps the map visible and light.</text>

    <circle cx="58" cy="258" r="11" fill="#C58A4A"/>
    <text x="84" y="266" fill="#25211C" font-size="22" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Card rhythm inside</text>
    <text x="84" y="296" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">Controls are split into compact modules.</text>
    <text x="84" y="322" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">No giant settings slab.</text>

    <circle cx="58" cy="394" r="11" fill="#C58A4A"/>
    <text x="84" y="402" fill="#25211C" font-size="22" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Map crown stays visible</text>
    <text x="84" y="432" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">Even in the large state, the map still</text>
    <text x="84" y="458" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">anchors the interaction.</text>

    <circle cx="58" cy="530" r="11" fill="#C58A4A"/>
    <text x="84" y="538" fill="#25211C" font-size="22" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">CTA dock</text>
    <text x="84" y="568" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">Actions sit in their own dock.</text>
    <text x="84" y="594" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">They do not fight with the sheet body.</text>

    <circle cx="58" cy="666" r="11" fill="#C58A4A"/>
    <text x="84" y="674" fill="#25211C" font-size="22" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Subtle moto cues</text>
    <text x="84" y="704" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">Route geometry, compact metrics, and</text>
    <text x="84" y="730" fill="#6E675F" font-size="17" font-family="Helvetica Neue, Arial, sans-serif">copper highlights do the work.</text>

    <path d="M42 638H642" stroke="#E7E0D8"/>
    <text x="42" y="792" fill="#25211C" font-size="24" font-weight="700" font-family="Helvetica Neue, Arial, sans-serif">Rule of thumb</text>
    <text x="42" y="826" fill="#6E675F" font-size="19" font-family="Helvetica Neue, Arial, sans-serif">The planner should feel like a riding instrument</text>
    <text x="42" y="854" fill="#6E675F" font-size="19" font-family="Helvetica Neue, Arial, sans-serif">laid above the map, not like a modal form page.</text>
  </g>
</svg>
